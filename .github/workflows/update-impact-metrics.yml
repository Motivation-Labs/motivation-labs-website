name: Update Impact Metrics

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      range_start:
        description: "Inclusive start date, YYYY-MM-DD in Hong Kong time"
        required: false
      range_end:
        description: "Exclusive end date, YYYY-MM-DD in Hong Kong time"
        required: false

concurrency:
  group: update-impact-metrics
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    name: Query Supabase and commit metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install "psycopg[binary]==3.2.13"

      - name: Step 01 Motivation Money, Step 02 Motivation Form, Step 03 Total
        env:
          MONEY_SUPABASE_DATABASE_URL: ${{ secrets.MONEY_SUPABASE_DATABASE_URL }}
          FORM_SUPABASE_DATABASE_URL: ${{ secrets.FORM_SUPABASE_DATABASE_URL }}
          MONEY_STRIPE_SECRET_KEY: ${{ secrets.MONEY_STRIPE_SECRET_KEY }}
          MONEY_STRIPE_ACCOUNT_ID: ${{ secrets.MONEY_STRIPE_ACCOUNT_ID }}
          FORM_STRIPE_SECRET_KEY: ${{ secrets.FORM_STRIPE_SECRET_KEY }}
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          METRICS_RANGE_START: ${{ inputs.range_start }}
          METRICS_RANGE_END: ${{ inputs.range_end }}
        run: |
          python scripts/update-impact-metrics.py
          cat src/data/product-impact-metrics.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Validate site
        run: |
          npm run lint
          npm run build

      - name: Commit and push metrics
        run: |
          cp src/data/product-impact-metrics.json /tmp/metrics-update.json

          git fetch origin main
          git reset --hard origin/main

          cp /tmp/metrics-update.json src/data/product-impact-metrics.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/product-impact-metrics.json
          if git diff --staged --quiet; then
            echo "No changes to metrics — skipping commit"
          else
            git commit -m "chore: update impact metrics"
            git push origin main
          fi
